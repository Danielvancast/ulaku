<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULAKU</title>

<!-- ICONOS LOCALES -->
<link rel="icon" href="icono-ulaku.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#c8521a">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

:root{
  --primary:#c8521a;
  --bg:#f5f1eb;
  --card:#ffffff;
  --border:#e0d9cf;
  --text:#1a1a1a;
  --muted:#7a7570;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:16px;
  font-size:14px;
  max-width:720px;
  margin:auto;
}

/* HEADER ULAKU */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.brand img{
  width:44px;
  height:44px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  padding:4px;
}

.brand h1{
  font-family:'DM Serif Display',serif;
  font-size:26px;
  color:var(--primary);
}

.subtitle{
  font-size:12px;
  color:var(--muted);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  margin-bottom:12px;
}

label{
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}

select,input{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:1px solid var(--border);
}

.fecha-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.prod-row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:6px;
}

.qty-btn{
  width:36px;
  height:36px;
  font-size:20px;
}

.btns{
  display:grid;
  gap:8px;
}

.btn{
  padding:16px;
  font-size:16px;
  border:none;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

.btn-primary{background:var(--primary)}
.btn-secondary{background:#2d6a4f}
.btn-calendar{background:#3a6ea5}

@media(max-width:700px){
  .fecha-row{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="brand">
  <img src="logo-ulaku.png" alt="ULAKU">
  <div>
    <h1>ULAKU</h1>
    <div class="subtitle">Sistema de pedidos</div>
  </div>
</div>

</body>
</html>
